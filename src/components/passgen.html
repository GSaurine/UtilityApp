<div class="passgen-container">
    <div class="result-box">
        <input type="text" id="pass-result" readonly placeholder="Sua senha aparecerá aqui">
        <button id="copy-pass-btn" title="Copiar"><i class="fas fa-copy"></i></button>
    </div>

    <div class="settings-box">
        <div class="setting-row">
            <label>Tamanho da Senha: <span id="length-val">12</span></label>
            <input type="range" id="pass-length" min="4" max="32" value="12">
        </div>

        <div class="checkbox-group">
            <label class="checkbox-item">
                <input type="checkbox" id="include-upper" checked> Maiúsculas (A-Z)
            </label>
            <label class="checkbox-item">
                <input type="checkbox" id="include-lower" checked> Minúsculas (a-z)
            </label>
            <label class="checkbox-item">
                <input type="checkbox" id="include-numbers" checked> Números (0-9)
            </label>
            <label class="checkbox-item">
                <input type="checkbox" id="include-symbols"> Símbolos (!@#$)
            </label>
        </div>

        <button id="generate-btn" class="main-action-btn">Gerar Senha</button>
    </div>
</div>
